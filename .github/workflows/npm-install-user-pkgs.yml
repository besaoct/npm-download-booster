# =============================================================================
# .github/workflows/npm-install-user-pkgs.yml
# =============================================================================
name: npm-install-user-pkgs

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 */6 * * *'   # Change this to adjust frequency
  workflow_dispatch:
    inputs:
      repeats:
        description: 'Number of times to install each package'
        required: false
        default: '100'
        type: string
      username:
        description: 'npm username (leave empty to auto-use your GitHub username)'
        required: false
        default: ''
        type: string

jobs:
  npm-install-user-pkgs:     # ← Changed to match workflow name
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch packages, boost downloads & get stats
        id: stats
        run: |
          # Auto-detect username: Input → GitHub repo owner (perfect for forks)
          if [ -n "${{ inputs.username }}" ]; then
            USERNAME="${{ inputs.username }}"
          else
            USERNAME="${{ github.repository_owner }}"
          fi

          echo "Using npm username: $USERNAME"
          echo "USERNAME=$USERNAME" >> $GITHUB_ENV

          echo "Fetching packages for: $USERNAME"
          curl -s "https://registry.npmjs.org/-/v1/search?text=maintainer:$USERNAME&size=250" \
            | jq -r '.objects[].package.name' > pkg-list.txt

          PACKAGE_COUNT=$(wc -l < pkg-list.txt)
          echo "Found $PACKAGE_COUNT packages"

          REPEATS=${{ inputs.repeats || 100 }}
          echo "REPEATS=$REPEATS" >> $GITHUB_ENV

          # === Boost Downloads ===
          mkdir -p /tmp/pkg-install
          cd /tmp/pkg-install
          npm init -y

          cat > /tmp/verify.js << 'EOF'
          try {
            require(process.argv[1]);
            console.log('Loaded OK');
          } catch (e) {
            console.error('LOAD FAILED:', e.message);
            process.exit(1);
          }
          EOF

          TOTAL_INSTALLS=0

          while read -r pkg; do
            if [ -z "$pkg" ]; then continue; fi
            echo "=== Processing $pkg ($REPEATS times) ==="

            for i in $(seq 1 $REPEATS); do
              echo "  → Run $i/$REPEATS"
              npm install "$pkg@latest" --no-audit --no-fund --prefer-offline && echo "    ✅ Installed" || echo "    ❌ Failed"
              node /tmp/verify.js "$pkg" && echo "    ✅ Loaded OK" || echo "    ❌ LOAD FAILED"
              npm uninstall "$pkg" >/dev/null 2>&1
              TOTAL_INSTALLS=$((TOTAL_INSTALLS + 1))
              sleep 0.3
            done
          done < "$GITHUB_WORKSPACE/pkg-list.txt"

          echo "TOTAL_INSTALLS=$TOTAL_INSTALLS" >> $GITHUB_ENV
          echo "Total installs this run: $TOTAL_INSTALLS"

          # === Generate Dynamic Table ===
          echo "| Package | Weekly Downloads | Badge |" > table.md
          echo "|---------|------------------|-------|" >> table.md

          while read -r pkg; do
            if [ -z "$pkg" ]; then continue; fi
            DOWNLOADS=$(curl -s "https://api.npmjs.org/downloads/point/last-week/$pkg" | jq -r '.downloads // 0')
            echo "| [$pkg](https://www.npmjs.com/package/$pkg) | $DOWNLOADS | [![Downloads](https://img.shields.io/npm/dw/$pkg)](https://www.npmjs.com/package/$pkg) |" >> table.md
          done < "$GITHUB_WORKSPACE/pkg-list.txt"

      - name: Update README.md
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          TABLE=$(cat table.md)

          sed -i '/<!-- DOWNLOAD_STATS_START -->/,/<!-- DOWNLOAD_STATS_END -->/c\<!-- DOWNLOAD_STATS_START -->\n**Last Updated:** '"$DATE"'\n\n### Overview\n\n- Runs every **6 hours**\n- Installs each package **100 times** per run\n- Each `npm install` counts as a real download on npm\n- Expected boost: **~2,800 downloads per package per week**\n\n### Packages & Weekly Downloads\n\n'"$TABLE"'\n\n**Total Boosted This Run:** '"${{ env.TOTAL_INSTALLS || 0 }}"' \n<!-- DOWNLOAD_STATS_END -->' README.md

          echo "README updated successfully"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update download stats & table (${{ env.TOTAL_INSTALLS || 0 }} installs) [skip ci]"
            git push
          fi
