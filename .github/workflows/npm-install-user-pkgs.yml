# =============================================================================
# .github/workflows/npm-install-user-pkgs.yml
#
# PURPOSE:
# Automatically checks installation of all packages published by npm user "besaoct".
# Runs every 6 hours + on code changes + manual trigger.
# =============================================================================
name: npm-install-user-pkgs

on:
  # Run automatically when code is pushed or a PR is created
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)

  # Manual trigger with options
  workflow_dispatch:
    inputs:
      repeats:
        description: 'Number of times to install/uninstall each package'
        required: false
        default: '100'
        type: string
      username:
        description: 'npm username (optional - overrides the hardcoded one)'
        required: false
        default: ''
        type: string

jobs:
  install-all:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch package list for npm user
        id: pkglist
        run: |
          USERNAME="${{ inputs.username }}"
          if [ -z "$USERNAME" ]; then
            USERNAME="besaoct"
          fi

          echo "Fetching packages for npm user: $USERNAME"
          curl -s "https://registry.npmjs.org/-/v1/search?text=maintainer:$USERNAME&size=250" \
            | jq -r '.objects[].package.name' > pkg-list.txt

          echo "Found $(wc -l < pkg-list.txt) packages:"
          cat pkg-list.txt

      - name: Install packages from user
        run: |
          REPEATS=${{ inputs.repeats || 100 }}
          echo "=== Starting installation runs with $REPEATS repeats per package ==="

          mkdir -p /tmp/pkg-install
          cd /tmp/pkg-install
          npm init -y

          cat > /tmp/verify.js << 'EOF'
          try {
            require(process.argv[1]);
            console.log('Loaded OK');
          } catch (e) {
            console.error('LOAD FAILED:', e.message);
            process.exit(1);
          }
          EOF

          TOTAL=0
          INSTALL_FAIL=0
          LOAD_FAIL=0

          while read -r pkg; do
            if [ -z "$pkg" ]; then continue; fi

            TOTAL=$((TOTAL + 1))
            echo "=== Processing $pkg ($REPEATS times) ==="

            for i in $(seq 1 $REPEATS); do
              echo "  → Run $i/$REPEATS"

              if npm install "$pkg@latest" --no-audit --no-fund; then
                echo "    ✅ Installed OK"
              else
                echo "    ❌ FAILED to install"
                INSTALL_FAIL=$((INSTALL_FAIL + 1))
                continue
              fi

              if node /tmp/verify.js "$pkg"; then
                echo "    ✅ Loaded OK"
              else
                echo "    ❌ LOAD FAILED"
                LOAD_FAIL=$((LOAD_FAIL + 1))
              fi

              npm uninstall "$pkg" >/dev/null 2>&1 && echo "    🗑️  Uninstalled" || echo "    ⚠️  Failed to uninstall"

              sleep 0.3
            done

            echo "----------------------------------------"
          done < "$GITHUB_WORKSPACE/pkg-list.txt"

          echo ""
          echo "========================================"
          echo "INSTALLATION SUMMARY"
          echo "========================================"
          echo "Total packages processed  : $TOTAL"
          echo "Repeats per package       : $REPEATS"
          echo "Total install attempts    : $((TOTAL * REPEATS))"
          echo "Install failures          : $INSTALL_FAIL"
          echo "Load failures             : $LOAD_FAIL"
          echo "========================================"

          if [ $INSTALL_FAIL -gt 0 ] || [ $LOAD_FAIL -gt 0 ]; then
            echo "⚠️  Some packages had failures!"
            exit 1
          else
            echo "✅ All packages processed successfully!"
          fi
