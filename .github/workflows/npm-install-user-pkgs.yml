# =============================================================================
# .github/workflows/npm-install-user-pkgs.yml
# =============================================================================
name: npm-install-user-pkgs

# Cancel previous runs if a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      repeats:
        description: 'Number of times to install each package per run'
        required: false
        default: '0'
        type: string
      username:
        description: 'npm username'
        required: false
        default: ''
        type: string
      frequency_hours:
        description: 'Run every X hours (1-24)'
        required: false
        default: '24'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  npm-install-user-pkgs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Initialize workflow variables
        id: init_vars
        run: |
          USERNAME="${{ inputs.username }}"
          USERNAME="${USERNAME:-${{ github.repository_owner }}}"
          REPEATS="${{ inputs.repeats }}"
          REPEATS="${REPEATS:-1}"
          FREQUENCY="${{ inputs.frequency_hours }}"
          FREQUENCY="${FREQUENCY:-24}"
          
          if ! [[ "$REPEATS" =~ ^[0-9]+$ ]] || [ "$REPEATS" -lt 1 ]; then
            echo "ERROR: Repeats must be a positive number"; exit 1
          fi
          if ! [[ "$FREQUENCY" =~ ^[0-9]+$ ]] || [ "$FREQUENCY" -lt 1 ] || [ "$FREQUENCY" -gt 24 ]; then
            echo "ERROR: Frequency must be between 1-24"; exit 1
          fi
          
          echo "USERNAME=$USERNAME" >> $GITHUB_ENV
          echo "REPEATS=$REPEATS" >> $GITHUB_ENV
          echo "FREQUENCY=$FREQUENCY" >> $GITHUB_ENV

      - name: Load Previous Stats
        id: load_stats
        run: |
          if [ -f "stats.json" ]; then
            TOTAL_RUNS=$(jq -r '.totalRuns // 0' stats.json 2>/dev/null || echo "0")
            TOTAL_BOOSTED=$(jq -r '.totalBoosted // 0' stats.json 2>/dev/null || echo "0")
            AVG_PER_RUN=$(jq -r '.avgPerRun // 0' stats.json 2>/dev/null || echo "0")
            TOTAL_PACKAGES=$(jq -r '.totalPackages // 0' stats.json 2>/dev/null || echo "0")
          else
            TOTAL_RUNS=0; TOTAL_BOOSTED=0; AVG_PER_RUN=0; TOTAL_PACKAGES=0
          fi
          
          echo "TOTAL_RUNS=$TOTAL_RUNS" >> $GITHUB_ENV
          echo "TOTAL_BOOSTED=$TOTAL_BOOSTED" >> $GITHUB_ENV
          echo "AVG_PER_RUN=$AVG_PER_RUN" >> $GITHUB_ENV
          echo "TOTAL_PACKAGES=$TOTAL_PACKAGES" >> $GITHUB_ENV

      - name: Create Initial Status & Update README
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          printf '%s\n' \
            '| Package | Badge | Total Boosted | Est. Weekly |' \
            '|---------|-------|---------------|-------------|' \
            '| **Running...** | ... | ... | ... |' > table.md
          
          awk '//,//{next} {print}' README.md > README.md.tmp 2>/dev/null || true
          
          {
            cat README.md.tmp 2>/dev/null || echo "# npm Download Booster"
            echo ""
            echo "**Last Updated:** $DATE *(In Progress)*"
            echo ""
            echo "### Packages & Stats"
            cat table.md
            echo ""
          } > README.md
          rm -f README.md.tmp

      - name: Fetch packages from npm registry
        id: fetch_packages
        run: |
          RESPONSE=$(curl -s --max-time 15 "https://registry.npmjs.org/-/v1/search?text=maintainer:$USERNAME&size=250")
          echo "$RESPONSE" | jq -r '.objects[].package.name' 2>/dev/null > pkg-list.txt || echo "" > pkg-list.txt
          PACKAGE_COUNT=$(grep -c '^[^[:space:]]' pkg-list.txt 2>/dev/null || echo "0")
          echo "PACKAGE_COUNT=$PACKAGE_COUNT" >> $GITHUB_ENV
          if [ "$PACKAGE_COUNT" -eq 0 ]; then
            echo "SKIP_BOOST=true" >> $GITHUB_ENV
          else
            echo "SKIP_BOOST=false" >> $GITHUB_ENV
          fi

      - name: Boost npm downloads
        id: boost
        if: env.SKIP_BOOST == 'false'
        run: |
          mkdir -p /tmp/pkg-install && cd /tmp/pkg-install
          npm init -y >/dev/null 2>&1
          
          cat > /tmp/verify.js << 'VERIFY_EOF'
          try { require(process.argv[1]); process.exit(0); } catch(e) { process.exit(1); }
          VERIFY_EOF
          
          TOTAL_INSTALLS=0
          PROXY_ATTEMPTS=0
          PROXY_SUCCESSES=0
          declare -A THIS_RUN_BOOST
          
          get_fresh_proxy() {
            > /tmp/current_proxies.txt
            curl -s "https://api.proxyscrape.com/v4/free-proxy-list/get?request=display_proxies&proxy_format=protocolipport&format=text&timeout=15000" >> /tmp/current_proxies.txt || true
            curl -s "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt" >> /tmp/current_proxies.txt || true
            curl -s "https://raw.githubusercontent.com/proxifly/free-proxy-list/main/proxies/protocols/http/data.txt" >> /tmp/current_proxies.txt || true
            curl -s "https://raw.githubusercontent.com/monosans/proxy-list/main/proxies/http.txt" >> /tmp/current_proxies.txt || true
            
            grep -E '^(http|https)://' /tmp/current_proxies.txt | sort -u | shuf > /tmp/shuffled.txt 2>/dev/null || true
            
            while IFS= read -r proxy || [ -n "$proxy" ]; do
              [ -z "$proxy" ] && continue
              if curl -s --max-time 8 --proxy "$proxy" "http://httpbin.org/ip" >/dev/null 2>&1; then
                echo "$proxy"
                return 0
              fi
            done < <(head -n 12 /tmp/shuffled.txt)
            echo ""
            return 1
          }
          
          while IFS= read -r pkg || [ -n "$pkg" ]; do
            [ -z "$pkg" ] && continue
            echo "→ Processing: $pkg"
            THIS_RUN_BOOST["$pkg"]=0
            
            for i in $(seq 1 $REPEATS); do
              echo " └─ Install $i/$REPEATS"
              
              npm cache clean --force 2>/dev/null || true
              rm -rf node_modules package-lock.json ~/.npm/_cacache ~/.npm/* 2>/dev/null || true
              
              SUCCESS=0
              PROXY=$(get_fresh_proxy)
              
              if [ -n "$PROXY" ]; then
                for attempt in {1..3}; do
                  PROXY_ATTEMPTS=$((PROXY_ATTEMPTS + 1))
                  export HTTP_PROXY=$PROXY
                  export HTTPS_PROXY=$PROXY
                  echo " └─ Attempt $attempt | Proxy: $PROXY"
                  
                  if npm install "$pkg@latest" --no-audit --no-fund --prefer-offline --no-cache --ignore-scripts \
                    --strict-ssl=false --silent 2>install.log; then
                    if node /tmp/verify.js "$pkg" >/dev/null 2>&1; then
                      TOTAL_INSTALLS=$((TOTAL_INSTALLS + 1))
                      THIS_RUN_BOOST["$pkg"]=$((THIS_RUN_BOOST["$pkg"] + 1))
                      PROXY_SUCCESSES=$((PROXY_SUCCESSES + 1))
                      echo " └─ ✅ Success (via Proxy)"
                      SUCCESS=1
                      break
                    fi
                  fi
                  echo " └─ Proxy attempt $attempt failed"
                  cat install.log 2>/dev/null || true
                  sleep 2
                done
              fi
              
              if [ $SUCCESS -eq 0 ]; then
                unset HTTP_PROXY HTTPS_PROXY
                for attempt in {1..2}; do
                  echo " └─ Attempt $attempt | Direct connection (fallback)"
                  if npm install "$pkg@latest" --no-audit --no-fund --prefer-offline --no-cache --ignore-scripts \
                    --strict-ssl=false --silent 2>install.log; then
                    if node /tmp/verify.js "$pkg" >/dev/null 2>&1; then
                      TOTAL_INSTALLS=$((TOTAL_INSTALLS + 1))
                      THIS_RUN_BOOST["$pkg"]=$((THIS_RUN_BOOST["$pkg"] + 1))
                      echo " └─ ✅ Success (Direct)"
                      SUCCESS=1
                      break
                    fi
                  fi
                  echo " └─ Direct attempt $attempt failed"
                  cat install.log 2>/dev/null || true
                  sleep 2
                done
              fi
              
              if [ $SUCCESS -eq 0 ]; then
                echo " └─ ❌ Failed after all attempts for $pkg"
              fi
              
              npm uninstall "$pkg" >/dev/null 2>&1 || true
              npm cache clean --force 2>/dev/null || true
              rm -rf node_modules package-lock.json ~/.npm/_cacache 2>/dev/null || true
              
              DELAY=$((RANDOM % 130 + 20))
              sleep 0.$DELAY
            done
          done < "$GITHUB_WORKSPACE/pkg-list.txt"
          
          for pkg in "${!THIS_RUN_BOOST[@]}"; do
            echo "THIS_RUN_${pkg//[^a-zA-Z0-9]/_}=${THIS_RUN_BOOST[$pkg]}" >> $GITHUB_ENV
          done
          
          echo "BOOST_THIS_RUN=$TOTAL_INSTALLS" >> $GITHUB_ENV
          echo "PROXY_ATTEMPTS=$PROXY_ATTEMPTS" >> $GITHUB_ENV
          echo "PROXY_SUCCESSES=$PROXY_SUCCESSES" >> $GITHUB_ENV

      - name: Set boost count for skipped runs
        if: env.SKIP_BOOST == 'true'
        run: |
          echo "BOOST_THIS_RUN=0" >> $GITHUB_ENV
          echo "PROXY_ATTEMPTS=0" >> $GITHUB_ENV
          echo "PROXY_SUCCESSES=0" >> $GITHUB_ENV

      - name: Calculate cumulative stats
        run: |
          TOTAL_RUNS=$((TOTAL_RUNS + 1))
          TOTAL_BOOSTED=$((TOTAL_BOOSTED + BOOST_THIS_RUN))
          AVG_PER_RUN=$((TOTAL_RUNS > 0 ? TOTAL_BOOSTED / TOTAL_RUNS : 0))
          RUNS_PER_WEEK=$(( (24 * 7) / FREQUENCY ))
          WEEKLY_BOOST=$((BOOST_THIS_RUN * RUNS_PER_WEEK))
          
          echo "TOTAL_RUNS=$TOTAL_RUNS" >> $GITHUB_ENV
          echo "TOTAL_BOOSTED=$TOTAL_BOOSTED" >> $GITHUB_ENV
          echo "AVG_PER_RUN=$AVG_PER_RUN" >> $GITHUB_ENV
          echo "WEEKLY_BOOST=$WEEKLY_BOOST" >> $GITHUB_ENV
          echo "RUNS_PER_WEEK=$RUNS_PER_WEEK" >> $GITHUB_ENV

      - name: Load and Update Per-Package Stats
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          if [ -f "pkg-stats.json" ]; then
            cp pkg-stats.json pkg-stats.json.bak
          else
            jq -n '{packages: {}, totalRuns: 0, lastUpdated: ""}' > pkg-stats.json
          fi
          
          while IFS= read -r pkg || [ -n "$pkg" ]; do
            [ -z "$pkg" ] && continue
            VAR_NAME="THIS_RUN_${pkg//[^a-zA-Z0-9]/_}"
            THIS_BOOST=${!VAR_NAME:-0}
            
            jq --arg pkg "$pkg" --argjson boost "$THIS_BOOST" --arg date "$DATE" '
              .packages[$pkg] |= (if . == null then {totalBoosted: 0} else . end) |
              .packages[$pkg].totalBoosted += $boost
            ' pkg-stats.json > pkg-stats.json.tmp && mv pkg-stats.json.tmp pkg-stats.json
          done < pkg-list.txt
          
          jq --argjson runs "$TOTAL_RUNS" --arg date "$DATE" '
            .totalRuns = $runs |
            .lastUpdated = $date
          ' pkg-stats.json > pkg-stats.json.tmp && mv pkg-stats.json.tmp pkg-stats.json

      - name: Generate download stats table
        run: |
          echo "| Package | Badge | Total Boosted | Est. Weekly |" > table.md
          echo "|---------|-------|---------------|-------------|" >> table.md
          
          if [ "$PACKAGE_COUNT" -gt 0 ]; then
            while IFS= read -r pkg || [ -n "$pkg" ]; do
              TOTAL_PKG=$(jq -r --arg p "$pkg" '.packages[$p].totalBoosted // 0' pkg-stats.json 2>/dev/null || echo "0")
              EST_WEEKLY=$(( TOTAL_RUNS > 0 ? (TOTAL_PKG * RUNS_PER_WEEK) / TOTAL_RUNS : 0 ))
              
              echo "| [$pkg](https://www.npmjs.com/package/$pkg) | <img alt=\"Downloads\" src=\"https://img.shields.io/npm/dw/$pkg\"> | $TOTAL_PKG | ~$EST_WEEKLY |" >> table.md
            done < pkg-list.txt
          else
            echo "| *No packages found* | — | — | — |" >> table.md
          fi

      - name: Save stats to JSON
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          jq -n \
            --arg runs "$TOTAL_RUNS" \
            --arg boosted "$TOTAL_BOOSTED" \
            --arg avg "$AVG_PER_RUN" \
            --arg weekly "$WEEKLY_BOOST" \
            --arg packages "$PACKAGE_COUNT" \
            --arg last "$DATE" \
            '{totalRuns: ($runs|tonumber), totalBoosted: ($boosted|tonumber), avgPerRun: ($avg|tonumber), estimatedWeeklyBoost: ($weekly|tonumber), totalPackages: ($packages|tonumber), lastRun: $last}' > stats.json

      - name: Update final README
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          
          {
            echo "# npm Download Booster"
            echo ""
            echo "This repository automatically boosts npm download counts for all packages published by a given npm user."
            echo ""
            echo "**Fork-friendly:** When you fork this repo, it will automatically use your GitHub username as the npm username (you can override it anytime via workflow dispatch)."
            echo ""
            echo "## How to Use"
            echo ""
            echo "1. Fork this repository"
            echo "2. Go to **Actions → npm-install-user-pkgs → Run workflow**"
            echo "3. Configure the inputs:"
            echo "   - **Repeats** — Number of installs per package (default: $REPEATS)"
            echo "   - **Username** — Your npm username (default: GitHub username)"
            echo "   - **Frequency (hours)** — How often it runs (default: $FREQUENCY)"
            echo ""
            echo "## Configuration Options"
            echo ""
            echo "| Option | Description | Default | How to Change |"
            echo "| --- | --- | --- | --- |"
            echo "| Frequency | Run every X hours | $FREQUENCY | Workflow dispatch or edit cron |"
            echo "| Repeats | Installs per package per run | $REPEATS | Manual trigger |"
            echo "| Username | npm username to boost | GitHub owner | Manual trigger |"
            echo ""
            echo "⚠️ **Important Notes**"
            echo ""
            echo "- This tool uses real \`npm install\` commands — each install counts as a legitimate download on npm."
            echo "- GitHub Actions has free minute limits (especially on public repositories)."
            echo "- npm may apply rate limiting if you use very high repeats or very low frequency."
            echo "- Use responsibly and respect npm's Terms of Service."
            echo ""
            echo "## 📊 Download Stats"
            echo ""
            echo "**Last Updated:** $DATE"
            echo ""
            echo "### Overview"
            echo "- Runs every **$FREQUENCY hours** (configurable)"
            echo "- Installs each package **$REPEATS times** per run (configurable)"
            echo ""
            echo "### Cumulative Stats"
            echo "- **Total Runs:** $TOTAL_RUNS"
            echo "- **Total Boosted:** $TOTAL_BOOSTED downloads"
            echo "- **Boosted This Run:** $BOOST_THIS_RUN downloads"
            echo "- **Average per Run:** $AVG_PER_RUN downloads"
            echo "- **Total Packages:** $PACKAGE_COUNT"
            echo "- **Estimated Weekly Boost:** ~$WEEKLY_BOOST downloads"
            echo "- **Last Run:** $DATE"
            echo ""
            echo "### Proxy Usage (This Run)"
            echo "- **Strategy:** Proxy first → Direct fallback"
            echo "- **Proxy Attempts:** $PROXY_ATTEMPTS"
            echo "- **Proxy Successes:** $PROXY_SUCCESSES"
            if [ "$PROXY_ATTEMPTS" -gt 0 ]; then
              echo "- **Proxy Success Rate:** $((PROXY_SUCCESSES * 100 / PROXY_ATTEMPTS))%"
            fi
            echo "- **Sources:** ProxyScrape, TheSpeedX, Proxifly, Monosans"
            echo ""
            echo "### Packages & Stats"
            cat table.md
            echo ""
            echo "*Package names are linked to their npm page. Total Boosted = lifetime successful installs.*"
          } > README.md

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md stats.json pkg-stats.json table.md pkg-list.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update download stats ($BOOST_THIS_RUN this run) [skip ci]"
            git push
          fi
