# =============================================================================
# .github/workflows/npm-install-user-pkgs.yml
# =============================================================================
name: npm-install-user-pkgs

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      repeats:
        description: 'Number of times to install each package per run'
        required: false
        default: '100'
        type: string
      username:
        description: 'npm username'
        required: false
        default: ''
        type: string
      frequency_hours:
        description: 'Run every X hours (1-24)'
        required: false
        default: '6'
        type: string

jobs:
  npm-install-user-pkgs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Load Previous Stats & Initial README Update
        id: init
        run: |
          # Load or initialize stats
          if [ -f "stats.json" ]; then
            TOTAL_RUNS=$(jq -r '.totalRuns // 0' stats.json)
            TOTAL_BOOSTED=$(jq -r '.totalBoosted // 0' stats.json)
            AVG_PER_RUN=$(jq -r '.avgPerRun // 0' stats.json)
            TOTAL_PACKAGES=$(jq -r '.totalPackages // 0' stats.json)
          else
            TOTAL_RUNS=0
            TOTAL_BOOSTED=0
            AVG_PER_RUN=0
            TOTAL_PACKAGES=0
          fi

          echo "TOTAL_RUNS=$TOTAL_RUNS" >> $GITHUB_ENV
          echo "TOTAL_BOOSTED=$TOTAL_BOOSTED" >> $GITHUB_ENV
          echo "AVG_PER_RUN=$AVG_PER_RUN" >> $GITHUB_ENV
          echo "PACKAGE_COUNT=$TOTAL_PACKAGES" >> $GITHUB_ENV

          # Create initial table safely
          echo "| Package | Weekly Downloads | Badge |" > table.md
          echo "|---------|------------------|-------|" >> table.md
          echo "| **Running...** | ... | ... |" >> table.md

          # Initial README update
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          sed -i '/<!-- DOWNLOAD_STATS_START -->/,/<!-- DOWNLOAD_STATS_END -->/c\<!-- DOWNLOAD_STATS_START -->\n**Last Updated:** '"$DATE"' *(In Progress)*\n\n### Overview\n- Runs every **'"${{ inputs.frequency_hours || 6 }}"' hours**\n- Installs each package **'"${{ inputs.repeats || 100 }}"' times** per run\n\n### Cumulative Stats\n- **Total Runs:** '"$TOTAL_RUNS"'\n- **Total Boosted:** '"$TOTAL_BOOSTED"' downloads\n- **Boosted This Run:** *Running...*\n- **Average per Run:** '"$AVG_PER_RUN"' downloads\n- **Total Packages:** '"$TOTAL_PACKAGES"'\n- **Estimated Weekly Boost:** Calculating...\n- **Last Run:** '"$DATE"'\n\n### Packages & Weekly Downloads\n\n'"$(cat table.md)"'\n<!-- DOWNLOAD_STATS_END -->' README.md

          echo "Initial README updated (in progress)"

      - name: Fetch packages & Boost downloads
        id: boost
        run: |
          # Username logic
          if [ -n "${{ inputs.username }}" ]; then
            USERNAME="${{ inputs.username }}"
          else
            USERNAME="${{ github.repository_owner }}"
          fi

          curl -s "https://registry.npmjs.org/-/v1/search?text=maintainer:$USERNAME&size=250" \
            | jq -r '.objects[].package.name' > pkg-list.txt

          PACKAGE_COUNT=$(wc -l < pkg-list.txt)
          echo "PACKAGE_COUNT=$PACKAGE_COUNT" >> $GITHUB_ENV
          echo "Found $PACKAGE_COUNT packages"

          # === Boosting ===
          mkdir -p /tmp/pkg-install && cd /tmp/pkg-install
          npm init -y
          cat > /tmp/verify.js << 'EOF'
          try { require(process.argv[1]); console.log('Loaded OK'); } catch(e) { console.error('LOAD FAILED'); process.exit(1); }
          EOF

          TOTAL_INSTALLS=0
          while read -r pkg; do
            if [ -z "$pkg" ]; then continue; fi
            for i in $(seq 1 ${{ inputs.repeats || 100 }}); do
              npm install "$pkg@latest" --no-audit --no-fund --prefer-offline >/dev/null 2>&1
              node /tmp/verify.js "$pkg" >/dev/null 2>&1
              npm uninstall "$pkg" >/dev/null 2>&1
              TOTAL_INSTALLS=$((TOTAL_INSTALLS + 1))
              sleep 0.3
            done
          done < "$GITHUB_WORKSPACE/pkg-list.txt"

          echo "BOOST_THIS_RUN=$TOTAL_INSTALLS" >> $GITHUB_ENV

          # Generate fresh table
          echo "| Package | Weekly Downloads | Badge |" > "$GITHUB_WORKSPACE/table.md"
          echo "|---------|------------------|-------|" >> "$GITHUB_WORKSPACE/table.md"
          while read -r pkg; do
            if [ -z "$pkg" ]; then continue; fi
            DOWNLOADS=$(curl -s "https://api.npmjs.org/downloads/point/last-week/$pkg" | jq -r '.downloads // 0')
            echo "| [$pkg](https://www.npmjs.com/package/$pkg) | $DOWNLOADS | [![Downloads](https://img.shields.io/npm/dw/$pkg)](https://www.npmjs.com/package/$pkg) |" >> "$GITHUB_WORKSPACE/table.md"
          done < "$GITHUB_WORKSPACE/pkg-list.txt"

      - name: Update Cumulative Stats & Final README
        id: final
        run: |
          TOTAL_RUNS=$(( ${{ env.TOTAL_RUNS }} + 1 ))
          TOTAL_BOOSTED=$(( ${{ env.TOTAL_BOOSTED }} + ${{ env.BOOST_THIS_RUN }} ))
          AVG_PER_RUN=$(( TOTAL_BOOSTED / TOTAL_RUNS ))
          RUNS_PER_WEEK=$(( 24 * 7 / ${{ inputs.frequency_hours || 6 }} ))
          WEEKLY_BOOST=$(( ${{ env.BOOST_THIS_RUN }} * RUNS_PER_WEEK ))

          # Save stats
          jq -n \
            --arg runs "$TOTAL_RUNS" \
            --arg boosted "$TOTAL_BOOSTED" \
            --arg avg "$AVG_PER_RUN" \
            --arg weekly "$WEEKLY_BOOST" \
            --arg packages "${{ env.PACKAGE_COUNT }}" \
            --arg last "$(date -u +"%Y-%m-%d %H:%M UTC")" \
            '{ 
              totalRuns: ($runs|tonumber), 
              totalBoosted: ($boosted|tonumber),
              avgPerRun: ($avg|tonumber),
              estimatedWeeklyBoost: ($weekly|tonumber),
              totalPackages: ($packages|tonumber),
              lastRun: $last
            }' > stats.json

          # Final README update
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          TABLE=$(cat table.md)

          sed -i '/<!-- DOWNLOAD_STATS_START -->/,/<!-- DOWNLOAD_STATS_END -->/c\<!-- DOWNLOAD_STATS_START -->\n**Last Updated:** '"$DATE"'\n\n### Overview\n- Runs every **'"${{ inputs.frequency_hours || 6 }}"' hours**\n- Installs each package **'"${{ inputs.repeats || 100 }}"' times** per run\n\n### Cumulative Stats\n- **Total Runs:** '"$TOTAL_RUNS"'\n- **Total Boosted:** '"$TOTAL_BOOSTED"' downloads\n- **Boosted This Run:** ${{ env.BOOST_THIS_RUN }} downloads\n- **Average per Run:** '"$AVG_PER_RUN"' downloads\n- **Total Packages:** ${{ env.PACKAGE_COUNT }}\n- **Estimated Weekly Boost:** ~'"$WEEKLY_BOOST"' downloads\n- **Last Run:** '"$DATE"'\n\n### Packages & Weekly Downloads\n\n'"$TABLE"'\n<!-- DOWNLOAD_STATS_END -->' README.md

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md stats.json table.md
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update download stats (${{ env.BOOST_THIS_RUN }} this run) [skip ci]"
            git push
          fi
